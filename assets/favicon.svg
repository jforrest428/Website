<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#050D1A"/>
  <!-- Trunk shadow -->
  <rect x="14" y="20" width="6" height="11" rx="2" fill="#6B4F18"/>
  <!-- Trunk -->
  <rect x="13" y="19" width="6" height="11" rx="2" fill="#8B6F24"/>
  <!-- Trunk highlight -->
  <rect x="15" y="21" width="2" height="7" rx="1" fill="#A07828" opacity="0.5"/>
  <!-- Crown - back layer (darker gold) -->
  <circle cx="10" cy="15" r="7" fill="#A07828"/>
  <circle cx="22" cy="15" r="7" fill="#A07828"/>
  <!-- Crown - main (gold) -->
  <circle cx="16" cy="10" r="9" fill="#C9A84C"/>
  <!-- Crown - front center (lighter) -->
  <circle cx="16" cy="15" r="7" fill="#D4B462"/>
  <!-- Top highlight -->
  <circle cx="13" cy="6" r="4" fill="#F0D898"/>
  <!-- Subtle data dots -->
  <circle cx="18" cy="9" r="1" fill="#8B6F24" opacity="0.45"/>
  <circle cx="13" cy="13" r="0.9" fill="#8B6F24" opacity="0.35"/>
</svg>
