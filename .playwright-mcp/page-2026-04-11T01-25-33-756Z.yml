    - dialog "Chat with Forrest Analytics" [ref=e416]:
      - generic [ref=e417]:
        - generic [ref=e418]: JF
        - generic [ref=e419]:
          - generic [ref=e420]: Josh from Forrest Analytics
          - generic [ref=e421]: AI Tools for Service Businesses
        - button "Close chat" [ref=e423] [cursor=pointer]:
          - img [ref=e424]
      - log "Conversation" [ref=e426]:
        - generic [ref=e427]:
          - generic [ref=e428]: Hey! I'm here to help you figure out which AI tools make the most sense for your business — no pitch, just honest answers. What kind of work do you run?
          - generic [ref=e429]: 09:23 PM
        - generic [ref=e443]:
          - generic [ref=e444]: What do you offer for plumbing companies?
          - generic [ref=e445]: 09:23 PM
        - generic [ref=e452]:
          - generic [ref=e453]: "Great question — plumbers are actually one of the best fits for what we do, and there's a reason for that. Josh built his core dataset on a real plumbing business — 3,200 inbound calls, 2,400 jobs, 850 customers. So the tools aren't theoretical for this industry. They're validated on real plumbing data. Here's what's most relevant for plumbers: **Missed-Call SMS Responder** is usually the #1 starting point. You're under a sink, on a job, can't answer — and that call goes to the next plumber on Google. The system texts them back within 30 seconds: *\"Hey, this is [Your Company] — we just missed your call. What can we help you with?\"* That one message recovers jobs that would've walked. From the dataset: **34% of inbound calls go unanswered** at a typical plumbing company. If even a fraction of those convert, the math gets good fast. **Estimate Follow-Up Automation** is a strong #2 for plumbers doing bigger jobs — water heaters, repiping, drain work where you're sending quotes. Most plumbers send one estimate and hope. This runs a 3-touch follow-up sequence automatically, so you're not the one chasing. And **Review Management** matters too — plumbing is a trust business. People are letting you into their home. Your Google presence either closes the deal or kills it. What's your current situation — are missed calls the main headache, or is something else costing you more right now?"
          - generic [ref=e454]: 09:24 PM
        - generic [ref=e455]:
          - generic [ref=e456]: How much does it cost?
          - generic [ref=e457]: 09:24 PM
        - generic [ref=e458]:
          - generic [ref=e459]: "Here's the full breakdown: | Product | Setup | Monthly | |---|---|---| | Missed-Call SMS Responder | $497 | $197/mo | | Review & Reputation Manager | $497 | $197/mo | | Estimate Follow-Up Automation | $597 | $247/mo | | Customer Re-Engagement Engine | $597 | $197/mo | | **Full Stack Bundle (all 4)** | **$997** | **$597/mo** | The bundle saves you $241/month vs buying everything individually. For most plumbers, the **Missed-Call SMS Responder** is the obvious first move. Here's the honest math: if it recovers just 2 missed calls per week at a $350 average job value, that's roughly $2,800/month recovered against a $197/month cost. It pays for itself in the first recovered call of the month. The setup fees cover Josh configuring everything for your specific business — you don't log into any software or learn anything new. It just runs. What's your average job value roughly? I can give you a more specific ROI picture based on your numbers."
          - generic [ref=e460]: 09:24 PM
        - generic [ref=e461]:
          - generic [ref=e462]: I'm not sure I need AI for my business
          - generic [ref=e463]: 09:25 PM
        - generic [ref=e464]:
          - generic [ref=e465]: "That's a fair thing to say — and honestly, not every business does. Some shops are running tight, answering every call, following up on every quote, and have a steady stream of reviews coming in. If that's you, you might not need any of this. But most plumbers I talk to have at least one of these happening: - Calls going to voicemail while they're on a job - Estimates that go quiet and never close - A Google profile that hasn't gotten a new review in months Any of those sound familiar for your business? The reason I ask: the tools aren't really \"AI\" in the buzzword sense. The Missed-Call SMS is just a reliable automated text. The follow-up sequences are just timely, personalized messages that go out so you don't have to remember. The \"AI\" part is in the personalization and knowing *which* customers to reach and when. If none of the pain points fit, I'll tell you honestly that it's probably not worth it. But if even one of them is costing you jobs, it's worth a 15-minute conversation with Josh to find out. No pitch, no pressure — he'll give you a straight read on whether it makes sense for your business. Want to grab that call?"
          - generic [ref=e466]: 09:25 PM
