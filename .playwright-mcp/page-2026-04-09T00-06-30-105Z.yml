                - paragraph [ref=e4110]: "\"I put a lead in with Yelp looking for a plumber and JB Plumbing was the first to reply and I'm glad they were. Bryan was able to come out within 2 hours of getting off the phone and not only give me an estimate but perform the work as we already had the fixture's we wanted to have installed. Bryan was punctual, professional, and friendly. Easy to talk to and very knowledgeable.. I learned a good bit! I have decided that JB Plumbing will be our go-to for any plumbing needs we have in the future and have already discussed future projects with them. 10/10 absolutely recommend for all your plumbing needs, fair prices, good value and friendly service.\""
