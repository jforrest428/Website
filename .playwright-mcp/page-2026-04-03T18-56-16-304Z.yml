        - paragraph [ref=e69]: Sound Familiar?
        - heading "Research Shouldn't Feel This Hard" [level=2] [ref=e70]
        - paragraph [ref=e72]: Most graduate students and organizations hit the same wall. You have the data, but not the time, tools, or expertise to turn it into defensible results.
