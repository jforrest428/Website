        - generic [ref=e74]:
          - img [ref=e76]
          - heading "\"I don't know which statistical test to use for my data.\"" [level=3] [ref=e80]
          - paragraph [ref=e81]: Choosing the wrong model can undermine your entire methodology. You need someone who understands the difference and when it matters for your specific study design.
        - generic [ref=e82]:
          - img [ref=e84]
          - heading "\"My data is messy and my defense date is getting close.\"" [level=3] [ref=e86]
          - paragraph [ref=e87]: Inconsistent variables, missing values, and disorganized responses are common, but they must be cleaned correctly before any analysis can be trusted by a committee.
        - generic [ref=e88]:
          - img [ref=e90]
          - heading "\"I have the output but I don't know how to write up the results.\"" [level=3] [ref=e93]
          - paragraph [ref=e94]: Translating SPSS or R output into clear, committee-ready language, with defensible interpretation and proper formatting, is its own specialized skill set.
