        - heading "Forrest Analytics Group" [level=2] [ref=e178]
        - paragraph [ref=e180]: I founded Forrest Analytics Group to give graduate researchers and small organizations access to serious analytical support, without the waiting lists, the overhead, or the jargon that makes statistics feel inaccessible.
        - paragraph [ref=e181]: My background spans applied statistics, survey methodology, and machine learning. Recent engagements include end-to-end statistical analysis for doctoral dissertations at institutions including the University of Pennsylvania (Wharton) and Duquesne University, from instrument validation and data cleaning through final results interpretation.
        - paragraph [ref=e182]: I work with clients who are serious about their data and need someone who will take their project seriously, whether that means passing a committee review, publishing a manuscript, or making a real business decision.
