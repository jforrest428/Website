  - region "The problem" [ref=e38]:
    - generic [ref=e39]:
      - generic [ref=e40]:
        - paragraph [ref=e41]: The Problem
        - heading "They Didn't Leave a Voicemail. They Called the Next Plumber." [level=2] [ref=e42]
      - generic [ref=e44]:
        - paragraph [ref=e45]: Studies consistently show that 85% of callers who reach voicemail do not leave a message. For a service business missing 5 calls a week at an average ticket of $600, that's $156,000 a year quietly walking out the door.
        - paragraph [ref=e46]: The problem isn't just the missed call itself — it's the timing. When someone's toilet is backing up or their water heater is dead, they need help now. The average caller gives you one shot. If your phone rings out, they're already scrolling to the next result. There's no second chance, no voicemail, no callback.
        - paragraph [ref=e47]: In the Keystone Plumbing dataset — 3,200 inbound calls over two years — 29% went unanswered. Nearly all of those happened after 5 PM, on weekends, and during peak mid-day field hours when every technician was already on a job. Those are exactly the moments when a customer's need is most urgent and their patience is shortest.
        - paragraph [ref=e48]: The Missed-Call SMS Responder closes that gap. Before the caller has time to open a new tab, they have a text from you — personal, warm, and offering to schedule. Not a robot. Not a voicemail prompt. A real message that sounds like your office sent it.
  - region "How it works" [ref=e49]:
    - generic [ref=e50]:
      - generic [ref=e51]:
        - paragraph [ref=e52]: How It Works
        - heading "Miss the Call. Win the Job." [level=2] [ref=e53]
      - generic [ref=e55]:
        - generic [ref=e56]:
          - generic [ref=e57]: "01"
          - heading "Call Goes Unanswered" [level=3] [ref=e58]
          - paragraph [ref=e59]: Your line rings out — you're on a job, after hours, or all techs are dispatched. Twilio detects the no-answer within seconds and triggers the responder automatically.
        - generic [ref=e60]:
          - generic [ref=e61]: "02"
          - heading "Claude Writes the Text" [level=3] [ref=e62]
          - paragraph [ref=e63]: Within 30 seconds, Claude composes a personalized SMS in your voice. If the caller is in your CRM, their name and last service history are included. After-hours calls get a different tone than midday calls. No templates — every message is written fresh.
        - generic [ref=e64]:
          - generic [ref=e65]: "03"
          - heading "They Reply. You Book." [level=3] [ref=e66]
          - paragraph [ref=e67]: The caller gets a friendly, human text before they have time to call someone else. They reply, you respond, and the job is booked — all from a conversation that started with a missed call.
  - region "What it does for your business" [ref=e68]:
    - generic [ref=e69]:
      - generic [ref=e70]:
        - paragraph [ref=e71]: What It Does For Your Business
        - heading "Turn Every Missed Call Into a Second Chance." [level=2] [ref=e72]
      - generic [ref=e74]:
        - generic [ref=e75]:
          - generic [ref=e76]: 30 sec
          - heading "Response Time, Every Time" [level=4] [ref=e77]
          - paragraph [ref=e78]: The SMS goes out in under 30 seconds after the call drops. That's faster than any human answering service and faster than the caller can navigate to a competitor's website.
        - generic [ref=e79]:
          - generic [ref=e80]: 20–35%
          - heading "Missed-Call Recovery Rate" [level=4] [ref=e81]
          - paragraph [ref=e82]: Industry benchmarks for immediate missed-call SMS show 20–35% of recipients reply and ultimately book. For a shop missing 5 calls a week, that's 1–2 additional jobs per week recovered.
        - generic [ref=e83]:
          - generic [ref=e84]: 24/7
          - heading "After-Hours Coverage Without Staff" [level=4] [ref=e85]
          - paragraph [ref=e86]: Your most expensive missed calls happen after 5 PM and on weekends. The responder never sleeps, never takes a day off, and never forgets to send the text. After-hours calls get a message that acknowledges the time and sets an expectation.
        - generic [ref=e87]:
          - generic [ref=e88]: Personal
          - heading "Sounds Like You, Not a Bot" [level=4] [ref=e89]
          - paragraph [ref=e90]: Returning customers get a message that references their name and service history. First-time callers get a warm, plain-English text that reads like your office sent it. Claude writes to match your business voice, not a generic template.
