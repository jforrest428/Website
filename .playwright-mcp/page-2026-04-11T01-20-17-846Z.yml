  - region "About this case study" [ref=e38]:
    - generic [ref=e39]:
      - note [ref=e40]:
        - paragraph [ref=e41]:
          - strong [ref=e42]: "About this case study:"
          - text: "Keystone Plumbing & Drain is a fictional Philadelphia-area plumbing and light-HVAC company constructed as a representative sample of the service businesses Forrest Analytics Group targets for AI implementation. The dataset spans April 2024 – April 2026: 850 customers, 2,400 jobs, 3,200 inbound calls, and 420 reviews. Every AI product below was designed, built, and validated against this data. Results shown are derived from the dataset, not projected or hypothetical."
      - generic [ref=e43]:
        - paragraph [ref=e44]: Business Profile
        - heading "Keystone Plumbing & Drain, By the Numbers" [level=2] [ref=e45]
        - paragraph [ref=e47]: "A residential and light-commercial plumbing operation doing what most well-run shops do: solid work, steady repeat customers, and a few expensive blind spots."
      - generic [ref=e48]:
