        - paragraph [ref=e62]: Sound Familiar?
        - heading "Research Shouldn't Feel This Hard" [level=2] [ref=e63]
        - paragraph [ref=e65]: Most graduate students and organizations hit the same wall. You have the data — but not the time, tools, or expertise to turn it into defensible results.
      - generic [ref=e66]:
        - generic [ref=e67]:
          - img [ref=e69]
          - heading "\"I don't know which statistical test to use for my data.\"" [level=3] [ref=e73]
          - paragraph [ref=e74]: Choosing the wrong model can undermine your entire methodology. You need someone who understands the difference — and when it matters for your specific study design.
        - generic [ref=e75]:
          - img [ref=e77]
          - heading "\"My data is messy and my defense date is getting close.\"" [level=3] [ref=e79]
          - paragraph [ref=e80]: Inconsistent variables, missing values, and disorganized responses are common — but they must be cleaned correctly before any analysis can be trusted by a committee.
        - generic [ref=e81]:
          - img [ref=e83]
          - heading "\"I have the output but I don't know how to write up the results.\"" [level=3] [ref=e86]
          - paragraph [ref=e87]: Translating SPSS or R output into clear, committee-ready language — with defensible interpretation and proper formatting — is its own specialized skill set.
