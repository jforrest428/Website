                        - paragraph [ref=e1553]:
                          - generic [ref=e1554]:
                            - text: As a business owner myself, I never like to leave a bad review publicly, however this situation deserves to be shared publicly.
                            - text: "Sila advertises 24/7 emergency HVAC service - but when I had an actual emergency (as in: water pouring from my bedroom ceiling late on a Friday night), I was told the earliest they could come was Monday."
                            - text: Less than a month earlier, they'd done a $2,000 repair on my system - including work both outside and in the attic where the current issue is happening. When I called and explained what was going on, I expected urgency or at least some ownership. Sympathy at the very least. Instead, I was greeted by an AI "rep" who robotically told me to calm down (as water was coming out of my ceiling). When I finally spoke to an actual human, I got told the issue "wasn't related" to the recent repairs and that they had no availability until Monday.
                            - text: When I pointed out their own "24/7 Emergency Service" claim - still very much live on their website - the rep told me, "We have hundreds of customers. How can you possibly expect us to be 24/7?"
                            - text: That kind of response isn't just dismissive - it's gaslighting. You advertise 24/7 service, I believed you, and now I'm somehow the irrational one for expecting what you sold me?
                            - text: To top it off, I got a follow-up call from another agent whose only mission seemed to be deflection and attitude - not help. I believe his name was Corey. He insisted the issue couldn't possibly be related to their recent work and suggested I call another company if I couldn't wait until Monday. So I did. And followed it up with a complaint to the BBB.
                            - text: If Sila can't actually deliver 24/7 service - or stand behind the work they just performed -- they should stop advertising it. Customers deserve better than this.
