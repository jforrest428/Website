                        - paragraph [ref=e951]:
                          - generic [ref=e952]:
                            - text: Sila installed our high velocity system in a former house in Drexel Hill in 2014. We had a good experience with the sales person and the installation crew. We had a little bit of a rocky start with our boiler maintenance but then a tech named Dino was assigned and he was great--professional, skilled, honest, and always prompt and dependable. We worked with Dino for 10+ years and always requested him for the boiler maintenance. We had pretty consistent service for our AC, but we did have trouble with one tech who ended up no longer working for Sila. I'd say overall for those ten years we had pretty good experience with Sila and when something didn't go right, they did their best to make it right. The cost of the agreement was more expensive, but we were satisfied with the service.
                            - text: When we moved to Doylestown, I wasn't going to stay with Sila, but when I found out that Dino came to Doylestown, that sealed the deal. Dino came for a boiler maintenance and then an AC maintenance. When I scheduled this year's boiler maintenance, Dino was cancelled by the office twice. Then they told me Dino couldn't come this far and they would send a seasoned tech--I said OK reluctantly, but I didn't have any option. We scheduled the new tech. The night before the appointment, that appointment was cancelled, and they asked me to schedule the maintenance for the fourth time. I complained about this, and they quickly offered some credit to my plan which was appreciated. The tech finally came yesterday. He was prompt, professional, and friendly. Everything on the boiler checked out. He told me since the water heater was right next to the boiler, he took a look at it, and the expansion tank was waterlogged and that'd impact performance and I might notice the pipes banging. They could replace it for around $650. I told him I didn't hear any noises and declined the repair. I thought it was odd that he assessed equipment that I didn't ask him to assess, and I don't appreciate being upsold, but I moved on. I didn't think too much about it until I read the reviews here and found similar stories about upselling for water heater systems and also about cancellations. I share this only so people are aware.
                            - text: I'm happy enough with the service I receive, so I'll continue my service and just be mindful and aware.
