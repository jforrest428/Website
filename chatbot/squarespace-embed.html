  FORREST INTELLIGENCE — CHATBOT EMBED
  =========================================
  Paste EVERYTHING below into:
  Squarespace → Settings → Advanced → Code Injection → Footer

  BEFORE PASTING:
  1. Deploy the backend (see chatbot/README.md)
  2. Replace YOUR_BACKEND_URL with your actual Railway/Render URL
     Example: https://fi-chatbot.up.railway.app
-->

<script>
/* ── Forrest Intelligence Chat Widget ── */
(function () {
  "use strict";

  var config = {
    backendUrl: "https://noble-trust-production-f3ab.up.railway.app",
    accentColor: "#2563EB",
    accentHover: "#1d4ed8",
    headerName: "Josh from Forrest Intelligence",
    headerSubtitle: "AI Tools for Service Businesses",
    greeting: "Hey! I'm here to help you figure out which AI tools make the most sense for your business \u2014 no pitch, just honest answers.\n\nWhat kind of work do you run?",
    quickReplies: [
      "What do you offer for service businesses?",
      "How much does it cost?",
      "I want a free audit call"
    ],
    poweredBy: "Powered by Forrest Intelligence",
  };

  var state = {
    isOpen: false,
    isTyping: false,
    conversationId: null,
    messages: [],
    quickRepliesShown: false,
    messageCount: 0,
    hasNotification: true,
  };

  var els = {};

  function injectStyles() {
    var css = [
      "#fi-chat-widget * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }",
      "#fi-bubble { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: " + config.accentColor + "; box-shadow: 0 4px 20px rgba(37,99,235,0.45); cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; z-index: 999998; transition: transform 0.2s ease, box-shadow 0.2s ease; }",
      "#fi-bubble:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(37,99,235,0.55); }",
      "#fi-bubble svg { transition: transform 0.3s ease, opacity 0.2s ease; }",
      "#fi-bubble.fi-open .fi-icon-chat { transform: scale(0) rotate(45deg); opacity: 0; position: absolute; }",
      "#fi-bubble.fi-open .fi-icon-close { transform: scale(1) rotate(0deg); opacity: 1; }",
      "#fi-bubble .fi-icon-close { transform: scale(0) rotate(-45deg); opacity: 0; position: absolute; }",
      "#fi-notif-dot { position: absolute; top: 2px; right: 2px; width: 12px; height: 12px; background: #ef4444; border-radius: 50%; border: 2px solid white; animation: fi-pulse 2s infinite; }",
      "@keyframes fi-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.2);opacity:.85} }",
      "#fi-window { position: fixed; bottom: 92px; right: 24px; width: 380px; height: 520px; background: #fff; border-radius: 16px; box-shadow: 0 12px 48px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08); display: flex; flex-direction: column; z-index: 999997; overflow: hidden; transform: scale(0.85) translateY(20px); transform-origin: bottom right; opacity: 0; pointer-events: none; transition: transform 0.25s cubic-bezier(.34,1.4,.64,1), opacity 0.2s ease; }",
      "#fi-window.fi-visible { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }",
      "#fi-header { background: #0f172a; padding: 16px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }",
      "#fi-avatar { width: 38px; height: 38px; border-radius: 50%; background: " + config.accentColor + "; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0; letter-spacing: -0.5px; }",
      "#fi-header-text { flex: 1; min-width: 0; }",
      "#fi-header-name { font-size: 14px; font-weight: 600; color: #f8fafc; line-height: 1.2; }",
      "#fi-header-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }",
      "#fi-status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(34,197,94,0.25); animation: fi-pulse 2.5s infinite; }",
      "#fi-close-btn { background: none; border: none; cursor: pointer; color: #64748b; padding: 4px; border-radius: 4px; display: flex; align-items: center; line-height: 1; transition: color 0.15s; }",
      "#fi-close-btn:hover { color: #f8fafc; }",
      "#fi-messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }",
      "#fi-messages::-webkit-scrollbar { width: 4px; }",
      "#fi-messages::-webkit-scrollbar-track { background: transparent; }",
      "#fi-messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }",
      ".fi-msg { max-width: 82%; display: flex; flex-direction: column; animation: fi-fadein 0.2s ease; }",
      "@keyframes fi-fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }",
      ".fi-msg-user { align-self: flex-end; }",
      ".fi-msg-assistant { align-self: flex-start; }",
      ".fi-msg-bubble { padding: 10px 13px; border-radius: 14px; font-size: 13.5px; line-height: 1.55; word-wrap: break-word; white-space: pre-wrap; }",
      ".fi-msg-user .fi-msg-bubble { background: " + config.accentColor + "; color: #fff; border-bottom-right-radius: 4px; }",
      ".fi-msg-assistant .fi-msg-bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }",
      ".fi-msg-time { font-size: 10px; color: #94a3b8; margin-top: 3px; padding: 0 4px; }",
      ".fi-msg-user .fi-msg-time { text-align: right; }",
      "#fi-typing { align-self: flex-start; display: none; }",
      "#fi-typing.fi-show { display: flex; }",
      "#fi-typing .fi-msg-bubble { background: #f1f5f9; padding: 12px 14px; }",
      ".fi-typing-dots { display: flex; gap: 4px; align-items: center; }",
      ".fi-typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: fi-bounce 1.2s infinite; }",
      ".fi-typing-dots span:nth-child(2) { animation-delay: 0.2s; }",
      ".fi-typing-dots span:nth-child(3) { animation-delay: 0.4s; }",
      "@keyframes fi-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }",
      "#fi-quick-replies { padding: 8px 14px 10px; display: flex; flex-direction: column; gap: 6px; }",
      ".fi-qr { background: #fff; border: 1.5px solid #e2e8f0; color: #1e293b; border-radius: 20px; padding: 7px 14px; font-size: 12.5px; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; line-height: 1.3; }",
      ".fi-qr:hover { border-color: " + config.accentColor + "; background: #eff6ff; color: " + config.accentColor + "; }",
      "#fi-input-area { border-top: 1px solid #f1f5f9; padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; background: #fff; }",
      "#fi-input { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 20px; padding: 9px 14px; font-size: 13.5px; color: #1e293b; resize: none; max-height: 100px; min-height: 38px; overflow-y: auto; line-height: 1.45; outline: none; transition: border-color 0.15s; background: #f8fafc; }",
      "#fi-input:focus { border-color: " + config.accentColor + "; background: #fff; }",
      "#fi-input::placeholder { color: #94a3b8; }",
      "#fi-send-btn { width: 36px; height: 36px; border-radius: 50%; background: " + config.accentColor + "; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }",
      "#fi-send-btn:hover { background: " + config.accentHover + "; }",
      "#fi-send-btn:active { transform: scale(0.92); }",
      "#fi-send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }",
      "#fi-footer { text-align: center; padding: 6px 12px 8px; font-size: 10px; color: #94a3b8; border-top: 1px solid #f1f5f9; background: #fff; flex-shrink: 0; }",
      "#fi-footer a { color: #94a3b8; text-decoration: none; }",
      "#fi-footer a:hover { color: " + config.accentColor + "; }",
      "@media (max-width: 480px) {",
      "  #fi-window { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }",
      "  #fi-bubble { bottom: 16px; right: 16px; }",
      "}",
    ].join("\n");

    var style = document.createElement("style");
    style.id = "fi-chat-styles";
    style.textContent = css;
    document.head.appendChild(style);
  }

  function buildWidget() {
    var wrapper = document.createElement("div");
    wrapper.id = "fi-chat-widget";
    wrapper.innerHTML = [
      '<button id="fi-bubble" aria-label="Open chat" aria-expanded="false">',
      '  <span id="fi-notif-dot" aria-hidden="true"></span>',
      '  <svg class="fi-icon-chat" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#fff" stroke-width="2" stroke-linejoin="round" fill="none"/></svg>',
      '  <svg class="fi-icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>',
      '</button>',
      '<div id="fi-window" role="dialog" aria-label="Chat with Forrest Intelligence" aria-hidden="true">',
      '  <div id="fi-header">',
      '    <div id="fi-avatar" aria-hidden="true">JF</div>',
      '    <div id="fi-header-text">',
      '      <div id="fi-header-name">Josh from Forrest Intelligence</div>',
      '      <div id="fi-header-sub">AI Tools for Service Businesses</div>',
      '    </div>',
      '    <div id="fi-status-dot" aria-hidden="true" title="Online"></div>',
      '    <button id="fi-close-btn" aria-label="Close chat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></button>',
      '  </div>',
      '  <div id="fi-messages" role="log" aria-live="polite" aria-label="Conversation">',
      '    <div id="fi-typing" class="fi-msg fi-msg-assistant" aria-label="Assistant is typing">',
      '      <div class="fi-msg-bubble"><div class="fi-typing-dots"><span></span><span></span><span></span></div></div>',
      '    </div>',
      '  </div>',
      '  <div id="fi-quick-replies" aria-label="Quick reply options"></div>',
      '  <div id="fi-input-area">',
      '    <textarea id="fi-input" placeholder="Type a message\u2026" rows="1" aria-label="Message input" maxlength="2000"></textarea>',
      '    <button id="fi-send-btn" aria-label="Send message" disabled>',
      '      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      '    </button>',
      '  </div>',
      '  <div id="fi-footer"><a href="https://forrestintelligence.com" target="_blank" rel="noopener">Powered by Forrest Intelligence</a></div>',
      '</div>',
    ].join("");
    document.body.appendChild(wrapper);
    els.bubble    = document.getElementById("fi-bubble");
    els.window    = document.getElementById("fi-window");
    els.messages  = document.getElementById("fi-messages");
    els.typing    = document.getElementById("fi-typing");
    els.quickReplies = document.getElementById("fi-quick-replies");
    els.input     = document.getElementById("fi-input");
    els.sendBtn   = document.getElementById("fi-send-btn");
    els.closeBtn  = document.getElementById("fi-close-btn");
    els.notifDot  = document.getElementById("fi-notif-dot");
  }

  function toggleWidget() { state.isOpen ? closeWidget() : openWidget(); }

  function openWidget() {
    state.isOpen = true;
    els.bubble.classList.add("fi-open");
    els.bubble.setAttribute("aria-expanded", "true");
    els.window.classList.add("fi-visible");
    els.window.setAttribute("aria-hidden", "false");
    if (els.notifDot) els.notifDot.style.display = "none";
    if (state.messages.length === 0) {
      setTimeout(function () { addMessage("assistant", config.greeting); showQuickReplies(); }, 300);
    }
    setTimeout(function () { scrollToBottom(); els.input.focus(); }, 350);
  }

  function closeWidget() {
    state.isOpen = false;
    els.bubble.classList.remove("fi-open");
    els.bubble.setAttribute("aria-expanded", "false");
    els.window.classList.remove("fi-visible");
    els.window.setAttribute("aria-hidden", "true");
  }

  function addMessage(role, text) {
    var ts = new Date();
    state.messages.push({ role: role, text: text, ts: ts });
    var msgEl = document.createElement("div");
    msgEl.className = "fi-msg fi-msg-" + role;
    var bubble = document.createElement("div");
    bubble.className = "fi-msg-bubble";
    bubble.textContent = text;
    var timeEl = document.createElement("div");
    timeEl.className = "fi-msg-time";
    timeEl.textContent = ts.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    timeEl.setAttribute("aria-hidden", "true");
    msgEl.appendChild(bubble);
    msgEl.appendChild(timeEl);
    els.messages.insertBefore(msgEl, els.typing);
    scrollToBottom();
    return msgEl;
  }

  function showTyping()  { state.isTyping = true;  els.typing.classList.add("fi-show");    scrollToBottom(); }
  function hideTyping()  { state.isTyping = false; els.typing.classList.remove("fi-show"); }
  function scrollToBottom() { els.messages.scrollTop = els.messages.scrollHeight; }

  function showQuickReplies() {
    if (state.quickRepliesShown) return;
    state.quickRepliesShown = true;
    els.quickReplies.innerHTML = "";
    config.quickReplies.forEach(function (text) {
      var btn = document.createElement("button");
      btn.className = "fi-qr";
      btn.textContent = text;
      btn.addEventListener("click", function () { els.quickReplies.innerHTML = ""; sendMessage(text); });
      els.quickReplies.appendChild(btn);
    });
  }

  function sendMessage(text) {
    text = (text || els.input.value).trim();
    if (!text || state.isTyping) return;
    addMessage("user", text);
    els.input.value = "";
    autoResizeInput();
    els.sendBtn.disabled = true;
    showTyping();
    fetch(config.backendUrl + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ conversation_id: state.conversationId, message: text }),
    })
      .then(function (res) {
        if (!res.ok) throw new Error("Server error " + res.status);
        hideTyping();
        var msgEl = document.createElement("div");
        msgEl.className = "fi-msg fi-msg-assistant";
        var bubble = document.createElement("div");
        bubble.className = "fi-msg-bubble";
        var timeEl = document.createElement("div");
        timeEl.className = "fi-msg-time";
        timeEl.setAttribute("aria-hidden", "true");
        msgEl.appendChild(bubble);
        msgEl.appendChild(timeEl);
        els.messages.insertBefore(msgEl, els.typing);
        var fullText = "";
        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buffer = "";
        function pump() {
          return reader.read().then(function (result) {
            if (result.done) {
              timeEl.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
              state.messages.push({ role: "assistant", text: fullText, ts: new Date() });
              return;
            }
            buffer += decoder.decode(result.value, { stream: true });
            var lines = buffer.split("\n");
            buffer = lines.pop();
            lines.forEach(function (line) {
              if (!line.startsWith("data: ")) return;
              try {
                var evt = JSON.parse(line.slice(6));
                if (evt.type === "delta") {
                  fullText += evt.text;
                  bubble.textContent = fullText.replace(/\[LEAD_CAPTURE:[^\]]*\]?/g, "").trimEnd();
                  scrollToBottom();
                } else if (evt.type === "done") {
                  state.conversationId = evt.conversation_id;
                  state.messageCount = evt.message_count;
                  if (evt.lead_captured) {
                    var c = document.createElement("div");
                    c.style.cssText = "text-align:center;font-size:11px;color:#22c55e;padding:4px 0;";
                    c.textContent = "\u2713 Info sent to Josh";
                    els.messages.insertBefore(c, els.typing);
                    scrollToBottom();
                    setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},4000);
                  }
                } else if (evt.type === "error") { bubble.textContent = evt.text; }
              } catch(e) {}
            });
            return pump();
          });
        }
        return pump();
      })
      .catch(function (err) {
        hideTyping();
        addMessage("assistant", "Sorry, I'm having a moment \u2014 try again in a sec, or reach out directly at josh@forrestintelligence.com");
      });
  }

  function autoResizeInput() {
    els.input.style.height = "auto";
    els.input.style.height = Math.min(els.input.scrollHeight, 100) + "px";
  }

  function init() {
    injectStyles();
    buildWidget();
    els.bubble.addEventListener("click", toggleWidget);
    els.closeBtn.addEventListener("click", closeWidget);
    els.input.addEventListener("input", function () {
      autoResizeInput();
      els.sendBtn.disabled = els.input.value.trim().length === 0;
    });
    els.input.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!els.sendBtn.disabled) sendMessage(); }
    });
    els.sendBtn.addEventListener("click", function () { sendMessage(); });
    document.addEventListener("keydown", function (e) { if (e.key === "Escape" && state.isOpen) closeWidget(); });
  }

  if (document.readyState === "loading") { document.addEventListener("DOMContentLoaded", init); } else { init(); }
})();
</script>
